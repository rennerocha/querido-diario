name: Deploy to Zyte Cloud

on:
  push:
    branches: [main]

jobs:
  deploy_to_zyte_cloud:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-python@v2
    - name: Install shub
      run: |
        python -m pip install --upgrade pip
        pip install shub
    - name: Deploy to Zyte Cloud
      env:
        SHUB_APIKEY: ${{ secrets.SHUB_APIKEY }}
      run: |
        python -m pip install --upgrade pip
        cd data_collection/
        shub deploy
